<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lagaw </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

/* card */
.card{
    width:90%;
    max-width:420px;
    padding:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    color:white;
    text-align:center;
    position:relative;
}

/* title */
h1{
    font-size:20px;
    margin-bottom:15px;
    animation:beat 1.5s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

/* buttons */
.btn{
    padding:10px 18px;
    border:none;
    border-radius:25px;
    cursor:pointer;
}

/* YES / NO */
/* button container */
#buttonBox{
    position:fixed;
    top:60%;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
}

/* YES */
#yesBtn{
    background:#00c853;
    color:white;
}

/* NO */
#noBtn{
    position:relative;
    background:#ff1744;
    color:white;
    transition:0.3s ease;
}

/* form */
#formBox{
    display:none;
    margin-top:15px;
    text-align:left;
}

/* select */
select{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    margin-top:8px;
    background:rgba(255,255,255,0.25);
    color:white;
}

select option{ color:black; }

/* radio */
input[type="radio"]{ display:none; }

.radio-label{
    display:block;
    padding:10px;
    margin:6px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
    transition:0.3s;
}

input[type="radio"]:checked + .radio-label{
    background:#ff4d6d;
}

/* submit */
#submitBtn{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
}

/* message */
#message{
     display:none;
    margin-top:20px;
    font-size:22px;
    text-align:center;

    /* center it properly */
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}

/* hide everything after submit */
.hide{
    opacity:0;
    pointer-events:none;
    transition:0.5s ease;
}
</style>
</head>

<body>

<div class="card" id="card">

    <h1 id="title">Lagaw ta bai? </h1>

    <div id="formBox">

        <label>🕒 San o ka free?</label>
        <select>
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
            <option>Sunday</option>
        </select>

        <br><br>

        <label>🌿 din mo gusto?</label>
        <input type="radio" id="nature" name="place">
        <label class="radio-label" for="nature">Nature 🌳</label>

        <input type="radio" id="cinema" name="place">
        <label class="radio-label" for="cinema">Cinema 🎬</label>

        <br>

        <label>🍔 ano gusto mo kaunon?</label>
        <input type="radio" id="jollibee" name="food">
        <label class="radio-label" for="jollibee">Jollibee 🍗</label>

        <input type="radio" id="mcdo" name="food">
        <label class="radio-label" for="mcdo">McDo 🍟</label>

        <button id="submitBtn">Submit </button>

        <div id="message">Lezgooo HAHAHAHAHA</div>
    </div>
</div>
<div id="buttonBox">
    <button id="yesBtn" class="btn">taaa</button>
    <button id="noBtn" class="btn">Hindi ko 😅</button>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const formBox = document.getElementById("formBox");
const message = document.getElementById("message");
const card = document.getElementById("card");

/* YES */
yesBtn.onclick = () => {
    yesBtn.style.display = "none";
    noBtn.style.display = "none";
    formBox.style.display = "block";
};

/* SMOOTH NO MOVE (only inside screen) */
/* SMOOTH NO MOVE (stay around the YES button area) */
function moveNo() {
    const buttonBox = document.getElementById("buttonBox");

    // area around the center
    const rangeX = 120;
    const rangeY = 80;

    const x = (Math.random() * rangeX * 2) - rangeX;
    const y = (Math.random() * rangeY * 2) - rangeY;

    noBtn.style.position = "relative";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);

/* SUBMIT */
document.getElementById("submitBtn").onclick = () => {
    message.style.display = "block";

    // hide everything except message
    document.getElementById("title").classList.add("hide");
    formBox.querySelectorAll("*:not(#message)").forEach(el=>{
        if(el !== message){
            el.classList.add("hide");
        }
    });
};
</script>

</body>
</html>
